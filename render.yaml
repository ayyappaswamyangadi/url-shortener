services:
  - type: web
    name: url-shortener-server
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: BASE_URL
        sync: false
